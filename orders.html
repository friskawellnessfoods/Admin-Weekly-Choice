<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="config.js"></script>
  
<style>

body{
font-family:system-ui;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

button{
padding:12px 16px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
cursor:pointer;
font-weight:600;
transition:all 0.15s ease;
}

button:active{
transform:scale(0.96);
background:#1565c0;
}

button.loading{
opacity:0.7;
pointer-events:none;
position:relative;
}

button.loading::after{
content:"";
width:16px;
height:16px;
border:2px solid #fff;
border-top:2px solid transparent;
border-radius:50%;
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
animation:spinBtn 0.6s linear infinite;
}

@keyframes spinBtn{
to{transform:translateY(-50%) rotate(360deg);}
}

</style>
</head>

<body>

<h2>My Orders</h2>

<div class="card">

<label>Start Date</label>
<input type="date" id="start">

<label>End Date</label>
<input type="date" id="end">

<button id="loadBtn" onclick="loadOrders()">Load Orders</button>

</div>

<div id="results"></div>

<script>


const params=new URLSearchParams(location.search);
const phone=params.get("phone");

async function loadOrders(){

const btn=document.getElementById("loadBtn");
btn.classList.add("loading");

const start=document.getElementById("start").value;
const end=document.getElementById("end").value;

const form=new URLSearchParams();
form.append("action","getClientOrdersByDate");
form.append("phone",phone);
form.append("start",start);
form.append("end",end);

const res=await fetch(API_URL,{
method:"POST",
body:form
});

const data=await res.json();

let html="";

Object.keys(data.orders).forEach(date=>{

html+=`<div class="card"><h3>${date}</h3>`;

data.orders[date].forEach(r=>{

html+=`<div><b>${r.slot}</b> - ${r.location}</div>`;

["option1","option2","breakfast","snack","juice1","juice2"]
.forEach(k=>{
if(r[k]) html+=`<div>• ${r[k]}</div>`;
});

});

html+="</div>";

});

document.getElementById("results").innerHTML=html;
btn.classList.remove("loading");
}

</script>

</body>
</html>
