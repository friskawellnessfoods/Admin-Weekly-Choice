<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weekly Menu</title>

<script src="config.js"></script>

<style>

body{
font-family: Georgia, serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.menu-wrapper{
max-width:1200px;
margin:auto;
}

.menu-title{
text-align:center;
font-size:42px;
letter-spacing:4px;
margin-bottom:20px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.tab{
padding:10px 20px;
border:1px solid #ccc;
background:white;
cursor:pointer;
font-weight:bold;
}

.tab.active{
background:black;
color:white;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.day-card{
background:white;
padding:20px;
border:1px solid #ddd;
}

.day-card h2{
text-align:center;
letter-spacing:2px;
margin-bottom:16px;
}

.section{
margin-bottom:14px;
}

.label{
font-weight:bold;
text-decoration:underline;
font-size:13px;
}

.dish{
font-size:14px;
margin-top:4px;
line-height:1.4;
}

.loading{
text-align:center;
padding:40px;
font-size:18px;
}

@media(max-width:900px){

.menu-grid{
grid-template-columns:1fr;
}

.tabs{
flex-direction:column;
align-items:center;
}

}

</style>

</head>

<body>

<div class="menu-wrapper">

<h1 class="menu-title">WEEKLY MENU</h1>

<div class="tabs">

<div class="tab active" onclick="switchProtein('veg',this)">VEGETARIAN</div>
<div class="tab" onclick="switchProtein('chicken',this)">CHICKEN</div>
<div class="tab" onclick="switchProtein('egg',this)">EGG & SEAFOOD</div>

</div>

<div id="menuGrid" class="menu-grid">
<div class="loading">Loading menu...</div>
</div>

</div>

<script>

let weeklyMenu = {};
let activeProtein = "veg";

async function loadMenu(){

const res = await fetch(API_URL + "?action=getMenu");
weeklyMenu = await res.json();

renderMenu();

}

function switchProtein(type,el){

activeProtein = type;

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

el.classList.add("active");

renderMenu();

}

function renderMenu(){

const grid = document.getElementById("menuGrid");
grid.innerHTML="";

const dates = Object.keys(weeklyMenu).sort();

dates.forEach(date=>{

const d = weeklyMenu[date];

const dayName = new Date(date)
.toLocaleDateString('en-US',{weekday:'long'});

function filterProtein(arr){

if(!arr) return "";

return arr
.filter(x=>{

const p = (x.protein||"").toLowerCase();

if(activeProtein==="veg") return p==="veg";

if(activeProtein==="chicken") return p==="chicken";

if(activeProtein==="egg")
return p==="egg" || p==="seafood";

return true;

})
.map(x=>x.label)
.join("<br>");

}

const card = `
<div class="day-card">

<h2>${dayName.toUpperCase()}</h2>

<div class="section">
<div class="label">BREAKFAST</div>
<div class="dish">${filterProtein(d.breakfast)}</div>
</div>

<div class="section">
<div class="label">OPTION 1</div>
<div class="dish">${filterProtein(d.option1)}</div>
</div>

<div class="section">
<div class="label">OPTION 2</div>
<div class="dish">${filterProtein(d.option2)}</div>
</div>

<div class="section">
<div class="label">SNACK</div>
<div class="dish">${(d.snack||[]).map(x=>x.label).join("<br>")}</div>
</div>

<div class="section">
<div class="label">JUICES</div>
<div class="dish">${(d.juice1||[]).join("<br>")}</div>
<div class="dish">${(d.juice2||[]).join("<br>")}</div>
</div>

</div>
`;

grid.innerHTML += card;

});

}

loadMenu();

</script>

</body>
</html>
