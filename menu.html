<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weekly Menu</title>

<script src="config.js"></script>

<style>

body{
font-family: Georgia, serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.menu-wrapper{
max-width:1200px;
margin:auto;
}

.menu-title{
text-align:center;
font-size:42px;
letter-spacing:4px;
margin-bottom:40px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.day-card{
background:white;
padding:20px;
border:1px solid #ddd;
}

.day-card h2{
text-align:center;
letter-spacing:2px;
margin-bottom:16px;
}

.section{
margin-bottom:14px;
}

.label{
font-weight:bold;
text-decoration:underline;
font-size:13px;
}

.dish{
font-size:14px;
margin-top:4px;
}

.loading{
text-align:center;
font-size:18px;
padding:40px;
}

@media(max-width:900px){
.menu-grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="menu-wrapper">

<h1 class="menu-title">WEEKLY MENU</h1>

<div id="menuGrid" class="menu-grid">
<div class="loading">Loading menu...</div>
</div>

</div>

<script>

async function loadMenu(){

const res = await fetch(API_URL + "?action=getMenu");
const menu = await res.json();

renderMenu(menu);

}

function renderMenu(menu){

const grid = document.getElementById("menuGrid");
grid.innerHTML="";

const dates = Object.keys(menu).sort();

dates.forEach(date=>{

const d = menu[date];

const dayName = new Date(date)
  .toLocaleDateString('en-US',{weekday:'long'});

function joinLabels(arr){
if(!arr) return "";
return arr.map(x=>x.label || x).join("<br>");
}

const card = `
<div class="day-card">

<h2>${dayName.toUpperCase()}</h2>

<div class="section">
<div class="label">BREAKFAST</div>
<div class="dish">${joinLabels(d.breakfast)}</div>
</div>

<div class="section">
<div class="label">OPTION 1</div>
<div class="dish">${joinLabels(d.option1)}</div>
</div>

<div class="section">
<div class="label">OPTION 2</div>
<div class="dish">${joinLabels(d.option2)}</div>
</div>

<div class="section">
<div class="label">SNACK</div>
<div class="dish">${joinLabels(d.snack)}</div>
</div>

<div class="section">
<div class="label">JUICES</div>
<div class="dish">${(d.juice1||[]).join("<br>")}</div>
<div class="dish">${(d.juice2||[]).join("<br>")}</div>
</div>

</div>
`;

grid.innerHTML += card;

});

}

loadMenu();

</script>

</body>
</html>
