<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weekly Menu</title>

<script src="config.js"></script>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:"Georgia",serif;
margin:0;
padding:20px;
color:#111;

background:linear-gradient(
180deg,
#f7e27a 0%,
#f2d35a 40%,
#e6b93f 100%
);
}

.menu-wrapper{
max-width:1200px;
margin:auto;
}

.menu-header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
margin-bottom:25px;
}

.logo{
height:55px;
}

.menu-title{
font-size:44px;
letter-spacing:6px;
margin:0;
}

/* TABS */

.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:35px;
}

.tab{
padding:8px 18px;
border:1px solid #bbb;
background:white;
cursor:pointer;
font-weight:bold;
letter-spacing:1px;
}

.tab.active{
background:black;
color:white;
}

/* DOWNLOAD BUTTON */

.download-btn{
background:#0a1a6e;
color:white;
border:none;
padding:8px 18px;
font-weight:bold;
letter-spacing:1px;
cursor:pointer;
}

/* GRID */

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

/* DAY CARD */

.day-card{

background:
linear-gradient(rgba(255,255,255,0.85),rgba(255,255,255,0.85)),
url("bg.webp");

background-size:cover;
background-position:center;

padding:28px;
border:1px solid #d4c38a;
border-radius:4px; 

box-shadow:0 6px 18px rgba(0,0,0,0.08);

}

.day-card h2{
text-align:center;
letter-spacing:4px;
font-size:26px;
margin-bottom:25px;
}

/* SECTION */

.section{
margin-bottom:24px;
}

.label{
text-align:center;
font-weight:bold;
letter-spacing:2px;
text-decoration:underline;
font-size:14px;
margin-bottom:10px;
}

/* DISH */

.dish{
font-size:15px;
line-height:1.7;
margin-bottom:6px;
color:#000;
}

/* DIVIDER */

.divider{
height:1px;
background:#d6b85c;
margin:18px 0;
}

/* MOBILE */

@media(max-width:900px){

.menu-grid{
grid-template-columns:1fr;
}

.menu-title{
font-size:34px;
}

}

</style>
</head>

<body>

<div class="menu-wrapper">

<div class="menu-header">

<img src="logo.png" class="logo">

<h1 class="menu-title">WEEKLY MENU</h1>

</div>


<div class="tabs">

<div class="tab active" onclick="switchProtein('all',this)">ALL</div>
<div class="tab" onclick="switchProtein('veg',this)">VEGETARIAN</div>
<div class="tab" onclick="switchProtein('chicken',this)">CHICKEN</div>
<div class="tab" onclick="switchProtein('egg',this)">EGG</div>
<div class="tab" onclick="switchProtein('seafood',this)">SEAFOOD</div>

<button class="download-btn" onclick="downloadMenuPDF()">DOWNLOAD MENU</button>

</div>

<div id="menuGrid" class="menu-grid">

<div style="text-align:center;padding:40px;font-size:18px;">
Loading menu...
</div>

</div>

</div>

<script>

let weeklyMenu = {};
let activeProtein = "all";

async function loadMenu(){

const res = await fetch(API_URL + "?action=getMenu");
weeklyMenu = await res.json();

renderMenu();

}

function switchProtein(type,el){

activeProtein = type;

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

el.classList.add("active");

renderMenu();

}

function renderMenu(){

const grid = document.getElementById("menuGrid");
grid.innerHTML="";

const dates = Object.keys(weeklyMenu).sort();

dates.forEach(date=>{

const d = weeklyMenu[date];

const dayName = new Date(date)
.toLocaleDateString('en-US',{weekday:'long'});

function filterProtein(arr){

if(!arr) return "";

return arr
.filter(x=>{

if(activeProtein==="all") return true;

const p=(x.protein||"").toLowerCase();
return p===activeProtein;

})
.map(x=>`<div class="dish">${x.label}</div>`)
.join("");

}

function simpleList(arr){

if(!arr) return "";

return arr
.map(x=>`<div class="dish">${x.label||x}</div>`)
.join("");

}

const card = `
<div class="day-card">

<h2>${dayName.toUpperCase()}</h2>

<div class="section">
<div class="label">BREAKFAST</div>
${filterProtein(d.breakfast)}
</div>

<div class="divider"></div>

<div class="section">
<div class="label">OPTION 1</div>
${filterProtein(d.option1)}
</div>

<div class="divider"></div>

<div class="section">
<div class="label">OPTION 2</div>
${filterProtein(d.option2)}
</div>

<div class="divider"></div>

<div class="section">
<div class="label">SNACK</div>
${simpleList(d.snack)}
</div>

<div class="divider"></div>

<div class="section">
<div class="label">JUICES</div>
${simpleList(d.juice1)}
${simpleList(d.juice2)}
</div>

</div>
`;

grid.innerHTML += card;

});

}

/* PDF DOWNLOAD */

async function downloadMenuPDF(){

const { jsPDF } = window.jspdf;

const pdf = new jsPDF();

const categories = ["veg","chicken","egg","seafood"];

categories.forEach((cat,index)=>{

if(index>0) pdf.addPage();

let y = 20;

pdf.setFontSize(20);
pdf.text(cat.toUpperCase()+" MENU",105,y,{align:"center"});

y += 10;

const dates = Object.keys(weeklyMenu).sort();

dates.forEach(date=>{

const d = weeklyMenu[date];

const dayName = new Date(date)
.toLocaleDateString('en-US',{weekday:'long'});

y += 10;

pdf.setFontSize(14);
pdf.text(dayName.toUpperCase(),10,y);

function filter(arr){

if(!arr) return [];

return arr.filter(x=>{
const p=(x.protein||"").toLowerCase();
return p===cat;
}).map(x=>x.label);

}

const sections = [

["Breakfast",filter(d.breakfast)],
["Option 1",filter(d.option1)],
["Option 2",filter(d.option2)]

];

sections.forEach(sec=>{

if(sec[1].length===0) return;

y += 6;
pdf.setFontSize(11);
pdf.text(sec[0],10,y);

sec[1].forEach(item=>{

y += 5;

pdf.setFontSize(10);
pdf.text("- "+item,12,y);

});

});

});

});

pdf.save("Weekly_Menu.pdf");

}

loadMenu();

</script>

</body>
</html>
