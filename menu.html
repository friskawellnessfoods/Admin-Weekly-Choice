<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weekly Menu</title>

<script src="config.js"></script>

<style>

body{
font-family: Georgia, serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.menu-wrapper{
max-width:1200px;
margin:auto;
}

.menu-title{
text-align:center;
font-size:42px;
letter-spacing:4px;
margin-bottom:20px;
}

/* Tabs */

.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:35px;
}

.tab{
padding:8px 18px;
border:1px solid #bbb;
background:white;
cursor:pointer;
font-weight:bold;
}

.tab.active{
background:black;
color:white;
}

/* Grid */

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.day-card{
background:white;
padding:25px;
border:1px solid #ddd;
}

.day-card h2{
text-align:center;
letter-spacing:3px;
margin-bottom:25px;
}

/* Sections */

.section{
margin-bottom:22px;
}

.label{
text-align:center;
font-weight:bold;
text-decoration:underline;
font-size:14px;
margin-bottom:10px;
}

.dish{
text-align:left;
font-size:15px;
line-height:1.6;
margin-bottom:4px;
}

.loading{
text-align:center;
padding:40px;
font-size:18px;
}

@media(max-width:900px){
.menu-grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="menu-wrapper">

<h1 class="menu-title">WEEKLY MENU</h1>

<div class="tabs">

<div class="tab active" onclick="switchProtein('all',this)">ALL</div>
<div class="tab" onclick="switchProtein('veg',this)">VEGETARIAN</div>
<div class="tab" onclick="switchProtein('chicken',this)">CHICKEN</div>
<div class="tab" onclick="switchProtein('egg',this)">EGG</div>
<div class="tab" onclick="switchProtein('seafood',this)">SEAFOOD</div>

</div>

<div id="menuGrid" class="menu-grid">
<div class="loading">Loading menu...</div>
</div>

</div>

<script>

let weeklyMenu = {};
let activeProtein = "all";

async function loadMenu(){

const res = await fetch(API_URL + "?action=getMenu");
weeklyMenu = await res.json();

renderMenu();

}

function switchProtein(type,el){

activeProtein = type;

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

el.classList.add("active");

renderMenu();

}

function renderMenu(){

const grid = document.getElementById("menuGrid");
grid.innerHTML="";

const dates = Object.keys(weeklyMenu).sort();

dates.forEach(date=>{

const d = weeklyMenu[date];

const dayName = new Date(date)
.toLocaleDateString('en-US',{weekday:'long'});

function filterProtein(arr){

if(!arr) return "";

return arr
.filter(x=>{

if(activeProtein==="all") return true;

const p=(x.protein||"").toLowerCase();

return p===activeProtein;

})
.map(x=>`<div class="dish">${x.label}</div>`)
.join("");

}

function simpleList(arr){

if(!arr) return "";

return arr
.map(x=>`<div class="dish">${x.label||x}</div>`)
.join("");

}

const card = `
<div class="day-card">

<h2>${dayName.toUpperCase()}</h2>

<div class="section">
<div class="label">BREAKFAST</div>
${filterProtein(d.breakfast)}
</div>

<div class="section">
<div class="label">OPTION 1</div>
${filterProtein(d.option1)}
</div>

<div class="section">
<div class="label">OPTION 2</div>
${filterProtein(d.option2)}
</div>

<div class="section">
<div class="label">SNACK</div>
${simpleList(d.snack)}
</div>

<div class="section">
<div class="label">JUICES</div>
${simpleList(d.juice1)}
${simpleList(d.juice2)}
</div>

</div>
`;

grid.innerHTML += card;

});

}

loadMenu();

</script>

</body>
</html>
